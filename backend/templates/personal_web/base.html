<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Je suis Jarib{% endblock %}</title>
    <!--  
            STATIC FILES GOOGLE FONT SIZE
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,300&display=swap"
      rel="stylesheet"
    />
    {% load static %}
    <!-- reference your installed Font Awesome Free package's files here -->
    <script src="{% static 'fontawesomefree/js/all.min.js' %}"></script>
    <!--- 
        STATIC FILES CUSTOM CSS FILES
    -->
    <link rel="stylesheet" href="{% static 'css/home.css' %}"
  </head>
  <body>
    <div class="app">
      <input type="checkbox" id="check">
        <label for="check">
          <i class="fa-solid fa-bars" id="menu"></i>
          <i class="fa-solid fa-xmark" id="cancel"></i>
        </label>
      <div class="nav">
        {% include './sidenavbar.html' %}
      </div>
      <section class="main">
        {% block content %}
        <p>Welcome to my portfolio</p>
        {% endblock %}
      </section>
    </div>
  </body>
</html>
